name: release
on:
  release:
    types: [released]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐰 Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: 🏷️ Set package version
        run: bun version ${GITHUB_REF_NAME#v} --no-git-tag-version
      - name: 📦 Install dependencies
        run: bun ci
      - name: 🔨 Build
        run: bun run build
      - name: 🚀 Publish to npm via Trusted Publishing
        run: bun publish --provenance --access public
