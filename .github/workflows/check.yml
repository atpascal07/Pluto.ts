name: check
on:
  push:
    # only trigger on branches, not on tags
    branches:
      - '**'

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐰 Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: 📦 Install dependencies
        run: bun ci
      - name: 🔨 Build
        run: bun run build
      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist

  lint:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐰 Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: 📦 Install dependencies
        run: bun ci
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist
      - name: 🧹 Lint
        run: bun run lint

  typecheck:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'
      - name: 🐰 Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: 📦 Install dependencies
        run: bun ci
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: dist
      - name: 🔍 Typecheck
        run: bun run typecheck
